<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>HSNAD Overlay</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent !important;
      overflow: hidden;
      font-family: var(--font-family, 'Inter', sans-serif);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Container ── */
    #alert-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
      pointer-events: none;
    }

    /* ── Alert Box ── */
    #alert-box {
      display: none;
      position: relative;
      padding: 18px 26px 20px;
      border-radius: 16px;
      background: var(--bg-color, rgba(15, 15, 23, 0.88));
      border: 2px solid var(--highlight-color, #32C3A6);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
      min-width: 260px;
      max-width: 460px;
      gap: 10px;
    }

    /* Glow border animasi */
    #alert-box::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--highlight-color, #32C3A6), var(--accent2, #E5A832), var(--highlight-color, #32C3A6));
      background-size: 200% 200%;
      z-index: -1;
      opacity: 0;
      animation: borderGlow 2s ease infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.6; background-position: 0% 50%; }
      50%       { opacity: 1;   background-position: 100% 50%; }
    }

    /* ── Layouts ── */
    #alert-box.layout-image-above-text {
      flex-direction: column;
      align-items: center;
    }
    #alert-box.layout-image-left-text {
      flex-direction: row;
      align-items: center;
      text-align: left;
      gap: 16px;
    }
    #alert-box.layout-text-only #alert-image-wrap { display: none !important; }

    /* ── Image ── */
    #alert-image-wrap {
      width: var(--img-size, 80px);
      height: var(--img-size, 80px);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #alert-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    /* ── Text ── */
    #alert-text-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    #alert-text {
      font-size: var(--font-size, 28px);
      font-weight: var(--font-weight, 700);
      color: var(--text-color, #FFFFFF);
      line-height: 1.25;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    #alert-text .hl {
      color: var(--highlight-color, #32C3A6);
      display: inline-block;
    }
    #alert-text .hl.anim-text-wiggle    { animation: wiggle 0.7s ease; }
    #alert-text .hl.anim-text-bounce    { animation: textBounce 0.6s cubic-bezier(0.36,0.07,0.19,0.97); }
    #alert-text .hl.anim-text-shake     { animation: shake 0.5s ease; }
    #alert-text .hl.anim-text-flash     { animation: flash 0.8s ease; }
    #alert-text .hl.anim-text-pulse     { animation: pulse 0.8s ease; }
    #alert-text .hl.anim-text-rubberBand { animation: rubberBand 0.8s ease; }

    #alert-message {
      font-size: calc(var(--font-size, 28px) * 0.58);
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      font-style: italic;
      line-height: 1.4;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* ── Platform badge ── */
    #platform-badge {
      position: absolute;
      top: -10px;
      right: 14px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--highlight-color, #32C3A6);
      color: #000;
      opacity: 0.85;
    }

    /* ══════════════════════════════════════════════
       ANIMATION IN
    ══════════════════════════════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-70px) scaleY(0.85); }
      to   { opacity: 1; transform: translateY(0) scaleY(1); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-80px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(80px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes bounceIn {
      0%   { opacity: 0; transform: scale(0.25); }
      55%  { opacity: 1; transform: scale(1.08); }
      75%  { transform: scale(0.92); }
      90%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes flipInX {
      from { opacity: 0; transform: perspective(400px) rotateX(-90deg); }
      to   { opacity: 1; transform: perspective(400px) rotateX(0); }
    }
    @keyframes rollIn {
      from { opacity: 0; transform: translateX(-100px) rotate(-120deg); }
      to   { opacity: 1; transform: translateX(0) rotate(0); }
    }

    /* ══════════════════════════════════════════════
       ANIMATION OUT
    ══════════════════════════════════════════════ */
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-16px); }
    }
    @keyframes slideOutUp {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-70px); }
    }
    @keyframes slideOutLeft {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-80px); }
    }
    @keyframes slideOutRight {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(80px); }
    }
    @keyframes zoomOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.5); }
    }
    @keyframes flipOutX {
      from { opacity: 1; transform: perspective(400px) rotateX(0); }
      to   { opacity: 0; transform: perspective(400px) rotateX(90deg); }
    }

    /* ══════════════════════════════════════════════
       TEXT ANIMATIONS
    ══════════════════════════════════════════════ */
    @keyframes wiggle {
      0%,100%{ transform:rotate(0); }
      20%    { transform:rotate(-4deg); }
      40%    { transform:rotate(4deg); }
      60%    { transform:rotate(-2deg); }
      80%    { transform:rotate(2deg); }
    }
    @keyframes textBounce {
      0%,100%{ transform:translateY(0); }
      30%    { transform:translateY(-10px); }
      60%    { transform:translateY(-4px); }
    }
    @keyframes shake {
      0%,100%{ transform:translateX(0); }
      20%    { transform:translateX(-6px); }
      40%    { transform:translateX(6px); }
      60%    { transform:translateX(-4px); }
      80%    { transform:translateX(4px); }
    }
    @keyframes flash {
      0%,50%,100%{ opacity:1; }
      25%,75%    { opacity:0.2; }
    }
    @keyframes pulse {
      0%,100%{ transform:scale(1); }
      50%    { transform:scale(1.12); }
    }
    @keyframes rubberBand {
      0%    { transform:scale(1,1); }
      30%   { transform:scale(1.25,0.75); }
      40%   { transform:scale(0.75,1.25); }
      60%   { transform:scale(1.15,0.85); }
      80%   { transform:scale(0.95,1.05); }
      100%  { transform:scale(1,1); }
    }

    /* ── Apply classes ── */
    .in-fadeIn      { animation: fadeIn      0.5s ease both; }
    .in-slideIn     { animation: slideInDown 0.5s cubic-bezier(0.34,1.2,0.64,1) both; }
    .in-slideInLeft { animation: slideInLeft 0.5s cubic-bezier(0.34,1.2,0.64,1) both; }
    .in-slideInRight{ animation: slideInRight 0.5s cubic-bezier(0.34,1.2,0.64,1) both; }
    .in-bounceIn    { animation: bounceIn   0.7s cubic-bezier(0.36,0.07,0.19,0.97) both; }
    .in-zoomIn      { animation: zoomIn     0.4s cubic-bezier(0.34,1.3,0.64,1) both; }
    .in-flipInX     { animation: flipInX    0.6s ease both; }
    .in-rollIn      { animation: rollIn     0.6s ease both; }

    .out-fadeOut     { animation: fadeOut     0.45s ease both; }
    .out-slideOut    { animation: slideOutUp  0.4s ease both; }
    .out-slideOutLeft{ animation: slideOutLeft 0.4s ease both; }
    .out-slideOutRight{animation: slideOutRight 0.4s ease both; }
    .out-zoomOut     { animation: zoomOut     0.4s ease both; }
    .out-flipOutX    { animation: flipOutX    0.4s ease both; }
  </style>
</head>
<body>
  <div id="alert-container">
    <div id="alert-box" class="layout-image-above-text">
      <div id="platform-badge">Saweria</div>
      <div id="alert-image-wrap">
        <img id="alert-image" src="" alt="" />
      </div>
      <div id="alert-text-wrap">
        <div id="alert-text"></div>
        <div id="alert-message"></div>
      </div>
    </div>
  </div>

  <!-- Audio element untuk sound -->
  <audio id="alert-sound" preload="auto"></audio>

  <script>
    // ── Config & State ────────────────────────────────────────────────────────
    let config       = {};
    let hideTimeout  = null;
    let currentId    = null;
    let fontLoaded   = {};

    // ── Socket ────────────────────────────────────────────────────────────────
    const socket = io({ reconnectionDelay: 1000 });

    socket.on('connect', () => {
      socket.emit('overlay:ready');
      console.log('[Overlay] Connected:', socket.id);
    });

    socket.on('config:update', (cfg) => {
      config = cfg;
      applyGlobalStyles(cfg);
      loadGoogleFont(cfg?.platforms?.saweria?.alert?.font);
      console.log('[Overlay] Config updated');
    });

    socket.on('alert:show',  showAlert);
    socket.on('alert:skip',  () => hideAlert(true));

    // ── Font Loader ───────────────────────────────────────────────────────────
    function loadGoogleFont(fontName) {
      if (!fontName || fontName === 'Inter' || fontLoaded[fontName]) return;
      const link = document.createElement('link');
      link.rel  = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fontName)}:wght@400;600;700;800;900&display=swap`;
      document.head.appendChild(link);
      fontLoaded[fontName] = true;
    }

    // ── Apply Styles ──────────────────────────────────────────────────────────
    function applyGlobalStyles(cfg) {
      const a   = cfg?.platforms?.saweria?.alert || {};
      const r   = document.documentElement;
      const img = Math.round((a.imageSize || 50) / 100 * 160) + 'px';

      r.style.setProperty('--font-family',     a.font        || 'Inter');
      r.style.setProperty('--font-size',       (a.fontSize   || 28) + 'px');
      r.style.setProperty('--font-weight',     a.fontWeight  || '700');
      r.style.setProperty('--text-color',      a.textColor   || '#FFFFFF');
      r.style.setProperty('--highlight-color', a.highlightColor || '#32C3A6');
      r.style.setProperty('--accent2',         '#E5A832');
      r.style.setProperty('--img-size',        img);

      // Background
      const bg = a.backgroundColor;
      if (!bg || bg === 'transparent') {
        r.style.setProperty('--bg-color', 'rgba(0,0,0,0)');
        document.getElementById('alert-box').style.backdropFilter = 'none';
        document.getElementById('alert-box').style.border = bg === 'transparent' ? 'none' : '';
      } else {
        r.style.setProperty('--bg-color', bg);
      }
    }

    // ── Play Sound ────────────────────────────────────────────────────────────
    function playSound(soundUrl, volume) {
      if (!soundUrl) return;
      const audio = document.getElementById('alert-sound');
      audio.src    = soundUrl;
      audio.volume = Math.max(0, Math.min(1, (volume || 50) / 100));
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    // ── Show Alert ────────────────────────────────────────────────────────────
    function showAlert(alert) {
      if (hideTimeout) clearTimeout(hideTimeout);

      currentId = alert.id;
      const pc  = config?.platforms?.[alert.platform]?.alert || {};

      // Load font kalau perlu
      loadGoogleFont(pc.font);

      // Apply styles sesuai platform ini
      applyAlertStyles(pc);

      // Platform badge
      const badge = document.getElementById('platform-badge');
      badge.textContent = alert.platform?.charAt(0).toUpperCase() + alert.platform?.slice(1) || '';

      // Teks utama dari template
      document.getElementById('alert-text').innerHTML = formatTemplate(
        pc.messageTemplate || '{name} donasi {amount}!', alert, pc
      );

      // Pesan donatur
      const msgEl = document.getElementById('alert-message');
      if (alert.message?.trim()) {
        msgEl.textContent = `"${alert.message}"`;
        msgEl.style.display = '';
      } else {
        msgEl.style.display = 'none';
      }

      // Gambar
      const imgWrap = document.getElementById('alert-image-wrap');
      const imgEl   = document.getElementById('alert-image');
      if (pc.imageUrl) {
        imgEl.src = pc.imageUrl;
        imgEl.onerror = () => { imgWrap.style.display = 'none'; };
        imgWrap.style.display = 'flex';
      } else {
        imgWrap.style.display = 'none';
      }

      // Layout class
      const box = document.getElementById('alert-box');
      box.className = 'layout-' + (pc.layout || 'image-above-text');

      // Tampilkan box
      box.style.display = 'flex';

      // Animasi masuk
      void box.offsetWidth; // reflow
      const animIn = pc.animationIn || 'fadeIn';
      box.classList.add('in-' + animIn);

      // Text animation pada highlight
      if (pc.textAnimation && pc.textAnimation !== 'none') {
        setTimeout(() => {
          document.querySelectorAll('.hl').forEach(el => {
            el.classList.add('anim-text-' + pc.textAnimation);
          });
        }, 400);
      }

      // Sound
      if (pc.sound && pc.sound !== 'none') {
        const soundMap = {
          default: '/sounds/default.wav',
          coin:    '/sounds/coin.wav',
          chime:   '/sounds/chime.wav',
          pop:     '/sounds/pop.wav',
        };
        const soundUrl = soundMap[pc.sound] || pc.soundUrl || '/sounds/default.wav';
        setTimeout(() => playSound(soundUrl, pc.soundVolume), 200);
      }

      // Auto-hide
      const duration = (pc.duration || 8) * 1000;
      hideTimeout = setTimeout(() => {
        hideAlert(false, pc.animationOut || 'fadeOut');
      }, duration);
    }

    // ── Apply per-alert styles ────────────────────────────────────────────────
    function applyAlertStyles(pc) {
      const r   = document.documentElement;
      const box = document.getElementById('alert-box');

      r.style.setProperty('--font-family',     pc.font           || 'Inter');
      r.style.setProperty('--font-size',       (pc.fontSize      || 28) + 'px');
      r.style.setProperty('--font-weight',     pc.fontWeight     || '700');
      r.style.setProperty('--text-color',      pc.textColor      || '#FFFFFF');
      r.style.setProperty('--highlight-color', pc.highlightColor || '#32C3A6');
      r.style.setProperty('--img-size',        Math.round((pc.imageSize || 50) / 100 * 160) + 'px');

      // Background
      const bg = pc.backgroundColor;
      if (!bg || bg === 'transparent') {
        r.style.setProperty('--bg-color', 'transparent');
        box.style.backdropFilter = 'none';
        box.style.border = 'none';
        box.style.boxShadow = 'none';
      } else {
        r.style.setProperty('--bg-color', bg);
        box.style.backdropFilter = 'blur(12px)';
        box.style.border = `2px solid ${pc.highlightColor || '#32C3A6'}`;
        box.style.boxShadow = '0 8px 32px rgba(0,0,0,0.5)';
      }
    }

    // ── Hide Alert ────────────────────────────────────────────────────────────
    function hideAlert(instant, animOut = 'fadeOut') {
      const box = document.getElementById('alert-box');
      if (!box || box.style.display === 'none') return;

      const done = () => {
        box.style.display = 'none';
        box.className = '';
        box.style.cssText = '';   // reset inline styles
        if (currentId) {
          socket.emit('alert:done', currentId);
          fetch('/api/alerts/done', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ alertId: currentId }),
          }).catch(() => {});
          currentId = null;
        }
      };

      if (instant) { done(); return; }

      // Hapus class animasi in
      ['in-fadeIn','in-slideIn','in-slideInLeft','in-slideInRight',
       'in-bounceIn','in-zoomIn','in-flipInX','in-rollIn'].forEach(c => box.classList.remove(c));

      box.classList.add('out-' + animOut);
      setTimeout(done, 480);
    }

    // ── Format Template ───────────────────────────────────────────────────────
    function formatTemplate(tpl, alert, pc) {
      const fmt = new Intl.NumberFormat('id-ID', {
        style: 'currency', currency: 'IDR', maximumFractionDigits: 0,
      }).format(alert.amount || 0);

      const textAnim = pc?.textAnimation && pc.textAnimation !== 'none'
        ? ` anim-text-${pc.textAnimation}` : '';

      return tpl
        .replace(/{name}/g,    `<span class="hl${textAnim}">${esc(alert.donorName || 'Someone')}</span>`)
        .replace(/{amount}/g,  `<span class="hl${textAnim}">${fmt}</span>`)
        .replace(/{message}/g, esc(alert.message || ''))
        .replace(/{platform}/g,esc(alert.platform || ''));
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
