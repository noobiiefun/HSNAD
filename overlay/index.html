<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hey Streamer — Overlay</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: var(--font, 'Inter', sans-serif);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    #alert-container {
      width: 100%;
      max-width: 480px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #alert-box {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px 28px;
      border-radius: 16px;
      background: var(--bg-color, rgba(15, 15, 23, 0.85));
      border: 2px solid var(--highlight-color, #32C3A6);
      backdrop-filter: blur(8px);
      text-align: center;
      min-width: 280px;
      max-width: 100%;
    }

    #alert-image-wrap {
      width: var(--img-size, 80px);
      height: var(--img-size, 80px);
      flex-shrink: 0;
    }

    #alert-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #alert-text-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #alert-text {
      font-size: var(--font-size, 32px);
      font-weight: var(--font-weight, 700);
      color: var(--text-color, #FFFFFF);
      line-height: 1.2;
    }

    #alert-text .highlight {
      color: var(--highlight-color, #32C3A6);
    }

    #alert-message {
      font-size: calc(var(--font-size, 32px) * 0.6);
      font-weight: 400;
      color: rgba(255,255,255,0.8);
      font-style: italic;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-20px); }
    }
    @keyframes slideInDown {
      from { opacity: 0; transform: translateY(-60px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideOutUp {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-60px); }
    }
    @keyframes bounceIn {
      0%   { opacity: 0; transform: scale(0.3); }
      50%  { opacity: 1; transform: scale(1.05); }
      70%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      20%       { transform: rotate(-3deg); }
      40%       { transform: rotate(3deg); }
      60%       { transform: rotate(-2deg); }
      80%       { transform: rotate(2deg); }
    }

    .anim-fadeIn    { animation: fadeIn 0.5s ease forwards; }
    .anim-fadeOut   { animation: fadeOut 0.5s ease forwards; }
    .anim-slideIn   { animation: slideInDown 0.5s ease forwards; }
    .anim-slideOut  { animation: slideOutUp 0.5s ease forwards; }
    .anim-bounceIn  { animation: bounceIn 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards; }
    .anim-wiggle    { animation: wiggle 0.6s ease; }

    /* Image above text layout (default) */
    #alert-box.layout-image-above-text { flex-direction: column; }
    /* Side by side layout */
    #alert-box.layout-image-left-text  { flex-direction: row; text-align: left; }
    /* Text only */
    #alert-box.layout-text-only #alert-image-wrap { display: none; }
  </style>
</head>
<body>
  <div id="alert-container">
    <div id="alert-box" class="layout-image-above-text">
      <div id="alert-image-wrap">
        <img id="alert-image" src="" alt="" />
      </div>
      <div id="alert-text-wrap">
        <div id="alert-text"></div>
        <div id="alert-message"></div>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    let config = {};
    let hideTimeout = null;
    let currentAlertId = null;

    socket.on('connect', () => {
      socket.emit('overlay:ready');
    });

    socket.on('config:update', (newConfig) => {
      config = newConfig;
      applyBaseStyles();
    });

    socket.on('alert:show', (alert) => {
      showAlert(alert);
    });

    socket.on('alert:skip', () => {
      hideAlert(true);
    });

    function applyBaseStyles() {
      const alertConfig = config?.platforms?.saweria?.alert || {};
      const root = document.documentElement;
      const imgSizePx = Math.round((alertConfig.imageSize || 50) / 100 * 160) + 'px';

      root.style.setProperty('--font', alertConfig.font || 'Inter');
      root.style.setProperty('--font-size', (alertConfig.fontSize || 32) + 'px');
      root.style.setProperty('--font-weight', alertConfig.fontWeight || '700');
      root.style.setProperty('--text-color', alertConfig.textColor || '#FFFFFF');
      root.style.setProperty('--highlight-color', alertConfig.highlightColor || '#32C3A6');
      root.style.setProperty('--bg-color', alertConfig.backgroundColor === 'transparent'
        ? 'transparent' : (alertConfig.backgroundColor || 'rgba(15,15,23,0.85)'));
      root.style.setProperty('--img-size', imgSizePx);
    }

    function showAlert(alert) {
      if (hideTimeout) clearTimeout(hideTimeout);

      currentAlertId = alert.id;
      const platformConfig = config?.platforms?.[alert.platform]?.alert || {};

      // Render teks dari template
      const text = formatTemplate(
        platformConfig.messageTemplate || '{name} donasi {amount}!',
        alert
      );

      // Split text & message
      document.getElementById('alert-text').innerHTML = text;
      document.getElementById('alert-message').textContent = alert.message || '';

      // Image
      const imgWrap = document.getElementById('alert-image-wrap');
      const img = document.getElementById('alert-image');
      if (platformConfig.imageUrl) {
        img.src = platformConfig.imageUrl;
        imgWrap.style.display = 'block';
      } else {
        imgWrap.style.display = 'none';
      }

      // Layout
      const box = document.getElementById('alert-box');
      box.className = 'layout-' + (platformConfig.layout || 'image-above-text');

      // Apply styles
      applyBaseStyles();

      // Animate in
      const animIn = platformConfig.animationIn || 'fadeIn';
      box.style.display = 'flex';
      box.classList.remove('anim-fadeOut', 'anim-slideOut');
      void box.offsetWidth; // reflow
      box.classList.add('anim-' + animIn);

      // Duration
      const duration = (platformConfig.duration || 8) * 1000;
      const textDelay = (platformConfig.textDelay || 1) * 1000;

      hideTimeout = setTimeout(() => {
        hideAlert(false, platformConfig.animationOut || 'fadeOut');
      }, duration);
    }

    function hideAlert(instant = false, animOut = 'fadeOut') {
      const box = document.getElementById('alert-box');
      if (instant) {
        box.style.display = 'none';
        box.className = '';
        if (currentAlertId) {
          socket.emit('alert:done', currentAlertId);
          currentAlertId = null;
        }
        return;
      }

      box.classList.remove('anim-fadeIn', 'anim-slideIn', 'anim-bounceIn');
      box.classList.add('anim-' + animOut);

      setTimeout(() => {
        box.style.display = 'none';
        box.className = '';
        if (currentAlertId) {
          socket.emit('alert:done', currentAlertId);
          // Juga POST ke REST agar server tau
          fetch('/api/alerts/done', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ alertId: currentAlertId }),
          }).catch(() => {});
          currentAlertId = null;
        }
      }, 500);
    }

    function formatTemplate(template, alert) {
      const amountFormatted = new Intl.NumberFormat('id-ID', {
        style: 'currency', currency: 'IDR', maximumFractionDigits: 0,
      }).format(alert.amount || 0);

      return template
        .replace(/{name}/g, `<span class="highlight">${escHtml(alert.donorName || 'Someone')}</span>`)
        .replace(/{amount}/g, `<span class="highlight">${amountFormatted}</span>`)
        .replace(/{message}/g, escHtml(alert.message || ''))
        .replace(/{platform}/g, escHtml(alert.platform || ''));
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
