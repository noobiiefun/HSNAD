<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 520px;
      height: 340px;
      overflow: hidden;
      background: transparent;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .splash {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0f0f17 0%, #16161f 60%, #1a1a28 100%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 32px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(50,195,166,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
      overflow: hidden;
    }

    /* Background glow */
    .splash::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(50,195,166,0.06) 0%, transparent 70%);
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* Accent top line */
    .splash::after {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #32C3A6, #E5A832, transparent);
      border-radius: 0 0 4px 4px;
    }

    /* Logo */
    .logo-wrap {
      animation: logoIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }
    .logo-img {
      width: 130px;
      height: auto;
      filter: drop-shadow(0 8px 24px rgba(50,195,166,0.25));
    }

    /* App name */
    .app-name {
      margin-top: 16px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #E5A832 0%, #f0c060 40%, #32C3A6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.5s ease 0.3s forwards;
      opacity: 0;
    }

    .app-sub {
      margin-top: 5px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      animation: fadeUp 0.5s ease 0.45s forwards;
      opacity: 0;
    }

    /* Loading bar */
    .loading-wrap {
      margin-top: 28px;
      width: 180px;
      animation: fadeUp 0.5s ease 0.6s forwards;
      opacity: 0;
    }
    .loading-track {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #32C3A6, #E5A832);
      border-radius: 2px;
      animation: loadBar 2.4s ease 0.8s forwards;
    }
    .loading-text {
      margin-top: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Version */
    .version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }

    /* Animations */
    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.7) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes loadBar {
      0%   { width: 0%; }
      20%  { width: 25%; }
      50%  { width: 55%; }
      75%  { width: 78%; }
      90%  { width: 90%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo-wrap">
      <img
        class="logo-img"
        src="../../build-assets/icon.png"
        alt="HSNAD Logo"
        onerror="this.style.display='none'"
      />
    </div>

    <div class="app-name">HSNAD</div>
    <div class="app-sub">HEY Streamer, Notice Alert Donation</div>

    <div class="loading-wrap">
      <div class="loading-track">
        <div class="loading-bar"></div>
      </div>
      <div class="loading-text" id="status">Starting server...</div>
    </div>

    <div class="version">v1.0.0</div>
  </div>

  <script>
    // Cycling status messages
    const messages = [
      'Starting server...',
      'Loading configuration...',
      'Connecting services...',
      'Preparing overlay engine...',
      'Almost ready...',
    ];
    let i = 0;
    const el = document.getElementById('status');
    const interval = setInterval(() => {
      i = (i + 1) % messages.length;
      el.textContent = messages[i];
      if (i === messages.length - 1) clearInterval(interval);
    }, 500);
  </script>
</body>
</html>
