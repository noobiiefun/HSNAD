<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 520px; height: 340px;
      overflow: hidden; background: transparent;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .splash {
      width: 100%; height: 100%;
      background: linear-gradient(145deg, #0f0f17 0%, #16161f 55%, #1c1c2a 100%);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 32px 80px rgba(0,0,0,0.85), 0 0 0 1px rgba(50,195,166,0.08);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* Top accent line */
    .splash::after {
      content: '';
      position: absolute; top: 0; left: 8%; right: 8%; height: 2px;
      background: linear-gradient(90deg, transparent, #32C3A6 40%, #E5A832 60%, transparent);
      border-radius: 0 0 4px 4px;
    }

    /* Ambient glow */
    .glow {
      position: absolute; width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(50,195,166,0.07) 0%, transparent 70%);
      top: -60px; left: 50%; transform: translateX(-50%);
      pointer-events: none;
    }

    /* Logo */
    .logo-wrap {
      opacity: 0;
      animation: logoIn 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
    }
    .logo-img {
      width: 110px; height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 6px 20px rgba(50,195,166,0.3))
              drop-shadow(0 2px 6px rgba(229,168,50,0.2));
    }

    /* Nama */
    .app-name {
      margin-top: 14px;
      font-size: 30px; font-weight: 900; letter-spacing: 5px;
      background: linear-gradient(120deg, #E5A832 0%, #f5d070 45%, #32C3A6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0; animation: fadeUp 0.5s ease 0.4s forwards;
    }
    .app-tagline {
      margin-top: 4px;
      font-size: 10.5px; font-weight: 500; color: rgba(255,255,255,0.3);
      letter-spacing: 1.8px; text-transform: uppercase;
      opacity: 0; animation: fadeUp 0.5s ease 0.55s forwards;
    }

    /* Loading bar */
    .loading-wrap {
      margin-top: 26px; width: 200px;
      opacity: 0; animation: fadeUp 0.5s ease 0.7s forwards;
    }
    .bar-track {
      height: 3px; background: rgba(255,255,255,0.07);
      border-radius: 2px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #32C3A6, #E5A832, #32C3A6);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: loadBar 2.6s cubic-bezier(0.4,0,0.2,1) 0.9s forwards,
                 shimmer 1.5s linear 0.9s infinite;
    }
    .status-txt {
      margin-top: 8px; font-size: 10px;
      color: rgba(255,255,255,0.28); text-align: center; letter-spacing: 0.3px;
      min-height: 14px;
    }

    /* Version */
    .ver {
      position: absolute; bottom: 14px; right: 18px;
      font-size: 10px; color: rgba(255,255,255,0.18); letter-spacing: 0.5px;
    }

    /* Made by */
    .made-by {
      position: absolute; bottom: 14px; left: 18px;
      font-size: 10px; color: rgba(255,255,255,0.18);
    }

    /* Keyframes */
    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.65) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes loadBar {
      0%   { width: 0%; }
      15%  { width: 20%; }
      40%  { width: 50%; }
      65%  { width: 72%; }
      85%  { width: 88%; }
      100% { width: 100%; }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="glow"></div>

    <div class="logo-wrap">
      <!--
        Di Electron production, file dimuat via loadFile() dari __dirname.
        Splash ada di resources/app/src/main/splash.html
        Icon ada di resources/build-assets/icon.png
        Jadi path relatif dari splash.html ke icon adalah ../../build-assets/icon.png
        Di dev: sama-sama relatif
      -->
      <img
        class="logo-img"
        id="logo"
        src=""
        alt="HSNAD"
      />
    </div>

    <div class="app-name">HSNAD</div>
    <div class="app-tagline">HEY Streamer, Notice Alert Donation</div>

    <div class="loading-wrap">
      <div class="bar-track">
        <div class="bar-fill"></div>
      </div>
      <div class="status-txt" id="status">Memulai server...</div>
    </div>

    <div class="ver">v1.0.0</div>
    <div class="made-by">by noobiiefun</div>
  </div>

  <script>
    // Set icon path secara dinamis agar benar di dev & production
    const logo = document.getElementById('logo');
    // Coba beberapa path fallback
    const paths = [
      '../../build-assets/icon.png',     // production (relative dari src/main/)
      '../../../build-assets/icon.png',  // fallback
      './icon.png',
    ];

    let idx = 0;
    function tryNext() {
      if (idx >= paths.length) { logo.style.display = 'none'; return; }
      logo.src = paths[idx++];
    }
    logo.onerror = tryNext;
    tryNext();

    // Cycling status messages
    const msgs = [
      'Memulai server...',
      'Memuat konfigurasi...',
      'Menghubungkan layanan...',
      'Menyiapkan overlay engine...',
      'Hampir siap...',
    ];
    const el = document.getElementById('status');
    let i = 0;
    const iv = setInterval(() => {
      i = Math.min(i + 1, msgs.length - 1);
      el.textContent = msgs[i];
      if (i === msgs.length - 1) clearInterval(iv);
    }, 520);
  </script>
</body>
</html>
